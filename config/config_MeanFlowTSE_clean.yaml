train:
  batch_size: 32
  num_epochs: 2000
  accumulation_steps: 2
  num_workers: 16
  log_lr: true
  precision: "bf16-mixed"
  log_dir: exp/MeanFlowTSE_clean
  log_interval: 1011
  detect_anomaly: false
  gradient_clip_val: 0.5
  limit_train_batches: null
  limit_val_batches: null
  overfit_batches: 0.0

scheduler:
  type: 'CosineAnnealingLR'
  t_max: 50
  eta_min: 0.00001
  warmup_epochs: 5
  lr_reduce_patience: 20
  lr_reduce_factor: 0.5
  start_epoch: 0

loss:
  gamma: 0

solver:
  step_size: 1.0
  test_step_size: 1.0
  method: 'euler' #'midpoint'

# Mean-flow specific configuration with alpha scheduling
meanflow:
  flow_ratio: 0.5  # 50% of samples use pure flow matching
  # Alpha scheduling parameters (epochs will be converted to iterations internally)
  alpha_schedule_start_epoch: 0    # Start transitioning from alpha=1 at epoch 0
  alpha_schedule_end_epoch: 2000   # Finish transitioning to alpha≈0 by epoch 1000
  alpha_gamma: 25.0                # Temperature parameter for sigmoid (default: 25)
  alpha_min: 0.005                 # Minimum alpha value (5e-3, never goes to true 0)
  
# Validation sampling configuration
validation:
  sample_steps: 1  # Number of sampling steps during validation

# filterbank config
model:
  input_dim: 512
  output_dim: 512
  pos_method: 'none'
  pos_length: 500
  hidden_size: 1024
  depth: 16
  num_heads: 16

dataset:
  enable_train_360: true
  enable_train_100: true
  train_360_dir: '/engram/naplab/users/rs4613/Mean-Flow/data/speakerbeam/egs/libri2mix/data/wav16k/min/train-360'
  train_100_dir: '/engram/naplab/users/rs4613/Mean-Flow/data/speakerbeam/egs/libri2mix/data/wav16k/min/train-100'
  val_dir: '/engram/naplab/users/rs4613/Mean-Flow/data/speakerbeam/egs/libri2mix/data/wav16k/min/dev'
  test_dir: '/engram/naplab/users/rs4613/Mean-Flow/data/speakerbeam/egs/libri2mix/data/wav16k/min/test'
  librimix_meta_dir: '/engram/naplab/users/rs4613/Mean-Flow/data/LibriMix/metadata'
  task: 'sep_clean'
  n_src: 2
  sample_rate: 16000
  segment: 3
  segment_aux: 3
  n_fft: 510
  win_length: 510
  hop_length: 128
  snr_range: [-15, 15]  # SNR range for sampling t during training, not actually used (legacy)

# Optim config
optim:
  optimizer: AdamW
  lr: 0.0001 # will not be applied if load_weights_only is false
  weight_decay: 0.01

ddp:
  use_ddp: true
  num_nodes: 1
  num_gpus: 4
  strategy: 'ddp'

seed: 42

early_stopping:
  enabled: false
  monitor: 'val_loss'
  patience: 50
  verbose: true
  mode: 'min'
  delta: 0.0

checkpoint:
  dir: 'exp/MeanFlowTSE_clean/checkpoints'
  ckpt_name: 'best'
  save_best: true
  save_last: true
  verbose: true
  monitor: 'val_loss'
  mode: min
  load_weights_only: false # if true, only load weights and discard checkpointed learning rate
  resume: null #'exp/MeanFlowTSE_clean/checkpoints/last.ckpt'

eval:
  checkpoint: 'exp/MeanFlowTSE_clean/checkpoints/best.ckpt'
  t_predicter: 'exp/ECAPA-TDNN-TPredictor_specAug_mlp/checkpoints/t_predictor_clean.ckpt'

t_predicter:
  C: 1024